name: autofix.ci
on:
  pull_request:
    paths:
      - 'src/lib/posts/**/*.md'
  workflow_dispatch:
jobs:
  textlint:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          log_level: 'debug'
      - name: Get pnpm store directory
        id: pnpm-cache-dir
        run: echo "STORE_PATH=$(pnpm store path --silent | tail -n 1)" >> $GITHUB_OUTPUT
      - name: Cache pnpm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Run textlint
        # textlint の終了コードを強制0にする
        run: pnpm exec textlint --fix src/lib/posts/**/*.md | true
        shell: bash {0}
      - name: Run markdownlint
        run: pnpm exec markdownlint-cli2 "src/lib/posts/**/*.md"
      - name: Autofix
        uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27
