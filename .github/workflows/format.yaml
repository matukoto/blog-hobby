name: autofix.ci
on:
  pull_request:
    paths:
      - 'src/lib/posts/**/*.md'
  workflow_dispatch:
jobs:
  textlint:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          log_level: 'debug'
      - name: Get pnpm store directory
        id: pnpm-cache-dir
        run: echo "STORE_PATH=$(pnpm store path --silent | tail -n 1)" >> $GITHUB_OUTPUT
      - name: Cache pnpm dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Run textlint
        # textlint の終了コードを強制0にする
        run: pnpm exec textlint --fix src/lib/posts/**/*.md | true
        shell: bash {0}
      - name: Run markdownlint
        run: pnpm exec markdownlint-cli2 "src/lib/posts/**/*.md"
      - name: Autofix
        uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27
